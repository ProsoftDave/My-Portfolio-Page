<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/style-for-projects.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
</head>
<body>
    <header>
        <div class="side-bar-holder" id="side-bar-holder">
            <div class="side-bar" id="side-bar">
                <span class="avatar-container" id="avatar-container"></span>

                <div class="header">Promise Chibuchi</div>

                <div class="navigation">
                    <i class="fa-solid fa-house" style="color: rgb(255, 255, 255);"></i>
                    <div><a href="../index.html">Home</a></div>
                </div>

                <div class="navigation">
                    <i class="fa-solid fa-circle-info" style="color: rgb(255, 255, 255);"></i>
                    <div><a href="about.html">About Me</a></div>
                </div>

                <div class="navigation">
                    <i class="fa-solid fa-address-book" style="color: rgb(255, 255, 255);"></i>
                    <div><a href="contact.html">Contact Me</a></div>
                </div>
            </div>
        </div>

        <div class="menu" id="menu"><i class="fa-solid fa-bars" style="color: rgb(255, 255, 255);"></i></div>

        <section class="current-page">
            <div>My Projects</div>
        </section>

        <section class="socials-wrapper" id="socials">
            <i class="fa-brands fa-whatsapp"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-x-twitter"></i>
        </section>
    </header>

    <main>
        <section class="content">
            <div class="image-container">
                <img src="https://res.cloudinary.com/duarq8azw/image/upload/v1774009634/ChatGPT_Image_Mar_20_2026_01_26_56_PM_ttu9jz.png" alt="cube">
            </div>

            <div class="text">
                <span class="top">Start by adding projects</span>

                <span class="description">Click <strong>Upload Project</strong> to add a project</span>
            </div>

            <button class="upload-btn">Upload Project</button>
        </section>
    </main>

    <footer>
        <div>
            <span><b>&copy; 2026 Promise Chibuchi.</b></span>

            <span>All rights Reserved.</span>
        </div>
    </footer>
</body>

<script>
    const toggleElement = document.getElementById("menu");

    const sideBar = document.getElementById("side-bar-holder");

    toggleElement.addEventListener("click", () => {
        sideBar.classList.toggle("active");

        toggleElement.classList.toggle("active");
    });

   var startX = 0

    var endX = 0

    function swipe(diff) {
        if (diff > 50) {
            sideBar.classList.remove("active");

            toggleElement.classList.remove("active");
        }
    };

    sideBar.addEventListener("touchstart", (e) => {
        startX = e.touches[0].clientX
    });

    sideBar.addEventListener("touchend", (e) => {
        endX = e.changedTouches[0].clientX

        swipe(startX - endX)
    });

    const socialHandleWrapper = document.getElementById("socials");

    const socialHandleIcons = Array.from(socialHandleWrapper.getElementsByTagName("i"));

    const links = [
        "https://www.instagram.com/david.promico?igsh=ZzlkcGlyNGY0MXNv",
        "https://x.com/realchibubz"
    ]

    socialHandleIcons.forEach((icon, i) => {
        icon.addEventListener("click", () => {
            if (socialHandleIcons.indexOf(icon) == 0) {
                /*window.open("pages/whatsapp.html", "_blank");*/
            } else {
                window.open(links[i - 1], "_blank");
            }
        });
    });
</script>

</html>
