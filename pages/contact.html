<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>

    <link rel="stylesheet" href="../css/style-for-contact.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="side-bar-holder" id="side-bar-holder">
            <div class="side-bar" id="side-bar">
                <span class="avatar-container" id="avatar-container"></span>

                <div class="header">Promise Chibuchi</div>

                <div class="navigation">
                    <i class="fa-solid fa-house" style="color: rgb(255, 255, 255);"></i>
                    <div><a href="../index.html">Home</a></div>
                </div>

                <div class="navigation">
                    <i class="fa-solid fa-circle-info" style="color: rgb(255, 255, 255);"></i>
                    <div><a href="about.html">About Me</a></div>
                </div>

                <div class="navigation">
                    <i class="fa-solid fa-cube" style="color: rgb(255, 255, 255);"></i>
                    <div><a href="projects.html">My Projects</a></div>
                </div>
            </div>
        </div>

        <div class="menu" id="menu"><i class="fa-solid fa-bars" style="color: rgb(255, 255, 255);"></i></div>

        <section class="current-page">
            <div>Contact</div>
        </section>

        <section class="socials-wrapper" id="socials">
            <i class="fa-brands fa-whatsapp"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-x-twitter"></i>
        </section>
    </header>

    <main>
        <div class="background">
            <div class="overlay"></div>

            <div class="form-container">
                <img src="https://res.cloudinary.com/duarq8azw/image/upload/v1773998618/ChatGPT_Image_Mar_20__2026__10_22_27_AM-removebg-preview_oidzva.png" alt="envelope">

                <div class="text">
                    <h2>Get In Touch</h2>

                    <p>Have a project in mind or just want to say hello? Feel free to reach out — I'd love to hear from you.</p>
                </div>

                <form action="https://promisechibuchi-server.onrender.com/submit" method="post">
                    <div>
                        <i class="fa-solid fa-user" style="color: rgb(128, 128, 128);"></i>
                        <input type="text" placeholder="Name" name="name">
                    </div>

                    <div>
                        <i class="fa-solid fa-envelope" style="color: rgb(128, 128, 128);"></i>
                        <input type="email" placeholder="Email" name="email" id="email-field">
                    </div>

                    <textarea placeholder="Message" name="msg"></textarea>

                    <input type="submit" class="submit" value="Send">
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div>
            <span><b>&copy; 2026 Promise Chibuchi.</b></span>

            <span>All rights Reserved.</span>
        </div>
    </footer>
</body>

<script>
    const toggleElement = document.getElementById("menu");

    const sideBar = document.getElementById("side-bar-holder");

    toggleElement.addEventListener("click", () => {
        sideBar.classList.toggle("active");

        toggleElement.classList.toggle("active");
    });

   var startX = 0

    var endX = 0

    function swipe(diff) {
        if (diff > 50) {
            sideBar.classList.remove("active");

            toggleElement.classList.remove("active");
        }
    };

    sideBar.addEventListener("touchstart", (e) => {
        startX = e.touches[0].clientX
    });

    sideBar.addEventListener("touchend", (e) => {
        endX = e.changedTouches[0].clientX

        swipe(startX - endX)
    });

    const socialHandleWrapper = document.getElementById("socials");

    const socialHandleIcons = Array.from(socialHandleWrapper.getElementsByTagName("i"));

    const links = [
        "https://www.instagram.com/david.promico?igsh=ZzlkcGlyNGY0MXNv",
        "https://x.com/realchibubz"
    ]

    socialHandleIcons.forEach((icon, i) => {
        icon.addEventListener("click", () => {
            if (socialHandleIcons.indexOf(icon) == 0) {
                /*window.open("pages/whatsapp.html", "_blank");*/
            } else {
                window.open(links[i - 1], "_blank");
            }
        });
    });

    const emailField = document.getElementById("email-field");

    emailField.value = localStorage.getItem("guestEmail")

    localStorage.clear()
</script>

</html>
