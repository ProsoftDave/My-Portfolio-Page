<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whatsapp Connect</title>

    <link rel="stylesheet" href="../css/style-for-whatsapp.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <p>
            <i class="fa-brands fa-whatsapp fa-lg" style="color: rgb(255, 255, 255); padding-right: 1rem;"></i>
            WhatsApp Connect
        </p>
    </header>

    <main>
        <div class="qr-code-header">
            <p style="max-width: 80%" class="connect">Point your phone's camera at this screen to scan the code<span>Connect to my WhatsApp account instantly</span></p>
        </div>

        <div class="qr-code-container">
            <img src="https://res.cloudinary.com/duarq8azw/image/upload/v1774032074/WhatsApp_Image_2026-03-20_at_7.11.54_PM_ctpdes.jpg" alt="qr-code" style="display: block; max-width: 90%; height: auto;">
        </div>
    </main>
</body>
</html>
